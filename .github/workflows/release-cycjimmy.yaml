name: Release Cycjimmy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-cycjimmy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29
        with:
          fetch-depth: 0

      - name: Semantic release
        id: semantic_release
        # Computes the next semantic version and publishes the GitHub release.
        uses: cycjimmy/semantic-release-action@ba330626c4750c19d8299de843f05c7aa5574f62 # v5.0.2
        with:
          semantic_version: 24.2.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release published
        if: steps.semantic_release.outputs.new_release_published == 'true'
        # Prints the version created by semantic-release.
        run: echo "Published v${{ steps.semantic_release.outputs.new_release_version }}"

      - name: No release published
        if: steps.semantic_release.outputs.new_release_published != 'true'
        # Makes the workflow outcome explicit when no version bump is needed.
        run: echo "No release published"
