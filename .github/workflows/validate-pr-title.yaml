name: Validate PR title

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened

jobs:
  main:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@48f2562f0d13c6f411efdce7a9c0c0bbbaece7e6 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Keep the allowed types aligned with the release strategy used in the repository.
          types: |
            fix
            feat
            docs
            chore
            refactor
            revert
            perf
            test
            ci
            build
            style
          requireScope: false
          validateSingleCommit: false
          validateSingleCommitMatchesPrTitle: false
